[global]
log_level = "info"

[mode]

[mode.clients]
enabled = true
refresh = true
misbehaviour = true

[mode.connections]
enabled = true

[mode.channels]
enabled = true

[mode.packets]
enabled = true
clear_interval = 100
clear_on_start = true
tx_confirmation = false

[rest]
enabled = false
host = "0.0.0.0"
port = 3000

[telemetry]
enabled = false
host = "0.0.0.0"
port = 3001

[[chains]]
id = "xrplevm_1449999-1"
type = "CosmosSdk"

rpc_addr = "http://xrplevm-a:26657"
grpc_addr = "http://xrplevm-a:9090"
event_source = { mode = "push", url = "ws://xrplevm-a:26657/websocket", batch_delay = "500ms" }

rpc_timeout = "10s"
trusted_node = true

account_prefix = "ethm"
key_name = "relayer-a"
key_store_folder = "/home/hermes/.hermes/keys"

address_type = { derivation = "ethermint", proto_type = { pk_type = "/ethermint.crypto.v1.ethsecp256k1.PubKey" } }

store_prefix = "ibc"

default_gas = 100000
max_gas = 4000000
gas_price = { price = 1, denom = "axrp" }
gas_multiplier = 1.2

max_msg_num = 30
max_tx_size = 2097152

clock_drift = "5s"
max_block_time = "5s"
trusting_period = "43200s"
trust_threshold = "2/3"

[chains.packet_filter]
policy = "allow"
list = [
  ["transfer", "*"],
]

