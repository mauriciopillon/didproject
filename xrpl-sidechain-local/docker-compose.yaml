x-xrplevm-build: &xrplevm-build
  context: .
  dockerfile: Dockerfile

services:
  xrplevm-a:
    image: xrplevm-local:dev
    build: *xrplevm-build
    container_name: xrplevm-a
    command: ["/usr/local/bin/start-persistent.sh"]
    environment:
      CHAIN_ID: "xrplevm_1450001-1"
      MONIKER: "xrplevm-a"
      CHAIN_LABEL: "Chain A"
      IP: "10.10.20.201"
      RPC_PORT: "8011"
      REST_PORT: "8012"
      GRPC_PORT: "8013"
      EVM_RPC_PORT: "8014"
      EVM_WS_PORT: "8015"
    networks:
      xrplevm_macvlan:
        ipv4_address: 10.10.20.201
    volumes:
      - xrplevm-a-data:/app/.exrpd

  xrplevm-b:
    image: xrplevm-local:dev
    build: *xrplevm-build
    container_name: xrplevm-b
    command: ["/usr/local/bin/start-persistent.sh"]
    environment:
      CHAIN_ID: "xrplevm_1450002-1"
      MONIKER: "xrplevm-b"
      CHAIN_LABEL: "Chain B"
      IP: "10.10.20.202"
      RPC_PORT: "8021"
      REST_PORT: "8022"
      GRPC_PORT: "8023"
      EVM_RPC_PORT: "8024"
      EVM_WS_PORT: "8025"
    networks:
      xrplevm_macvlan:
        ipv4_address: 10.10.20.202
    volumes:
      - xrplevm-b-data:/app/.exrpd

  hermes:
    image: informalsystems/hermes:1.13.1
    container_name: hermes
    entrypoint: ["sleep"]
    command: ["infinity"]
    volumes:
      - ./relayer/hermes/config.toml:/home/hermes/.hermes/config.toml:ro
      - ./relayer/hermes/mnemonics:/home/hermes/.hermes/mnemonics:ro
      - hermes-keys:/home/hermes/.hermes/keys
    depends_on:
      - xrplevm-a
      - xrplevm-b
    networks:
      xrplevm_macvlan:
        ipv4_address: 10.10.20.250

networks:
  xrplevm_macvlan:
    name: xrplevm_macvlan
    driver: macvlan
    driver_opts:
      parent: enp0s31f6
    ipam:
      config:
        - subnet: 10.10.20.0/24
          gateway: 10.10.20.1

volumes:
  xrplevm-a-data:
  xrplevm-b-data:
  hermes-keys:
